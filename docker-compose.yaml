services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/eletrosil-certs:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - eletrosil-network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - /etc/eletrosil-certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - eletrosil-network

  db:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: mrq831028
      POSTGRES_USER: zemarques
      POSTGRES_DB: estoque-db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zemarques -d estoque-db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eletrosil-network

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: always
    environment:
      DATABASE_URL: postgresql://zemarques:mrq831028@db:5432/estoque-db
      JWT_SECRET: "32f41ffaa7ad6f9eda312905d009be9e39955b7c0d078d24875a2396e5b61a8e"
      BASE_URL: https://eletrosil.top 
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8080"
    volumes:
      - avatars:/app/public/avatars
    networks:
      - eletrosil-network

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://backend:8080
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend
    command: sh -c "npm run build && npm run start"
    networks:
      - eletrosil-network

volumes:
  postgres_data:
  avatars:

networks:
  eletrosil-network:
    driver: bridge