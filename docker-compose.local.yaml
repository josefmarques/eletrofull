
# esse é o ambiente local, considere sempre usar /home/zemarques/eletrofull/docker-compose.local.yaml e /home/zemarques/eletrofull/nginx.local.conf
services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy-local
    restart: always
    ports:
      - "80:80"
      # Porta 443 removida, localhost usará apenas HTTP
    volumes:
      # Usa o nginx.local.conf para desenvolvimento local (sem SSL)
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - eletrosil-front-local
      - eletrosil-back-local
      - eletromarques-front-local
      - eletromarques-back-local
    networks:
      - eletrofull-network

  # SERVIÇO CERTBOT REMOVIDO: Não faz sentido em localhost

  db:
    image: postgres:17
    container_name: postgres-local
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: mrq831028
      POSTGRES_USER: zemarques
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: America/Sao_Paulo
    command:
      - "postgres"
      - "-c"
      - "timezone=America/Sao_Paulo"
    volumes:
      # Volume persistente dos dados
      - postgres_data_local:/var/lib/postgresql/data
      # Script de inicialização Multi-Tenant (cria bancos eletrosil_db e emarques_db)
      - ./init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init-multiple-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zemarques"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eletrofull-network

  # ══════════════════════════════════════════════════════════════════════════
  # TENANT 1 — ELETROSIL
  # ══════════════════════════════════════════════════════════════════════════

  eletrosil-back-local:
    build:
      context: ./backend
    container_name: eletrosil-back-local
    restart: always
    environment:
      DATABASE_URL: postgresql://zemarques:mrq831028@db:5432/eletrosil_db
      JWT_SECRET: "eletrosil-local-secret"
      COMPANY_NAME: "Eletrosil"
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8080 --reload"
    volumes:
      - ./backend:/app
      - avatars_local:/app/public/avatars
    networks:
      - eletrofull-network

  eletrosil-front-local:
    build:
      context: ./frontend
    container_name: eletrosil-front-local
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://eletrosil-back-local:8080
      - NEXT_PUBLIC_COMPANY_NAME=Eletrosil
      - NEXT_PUBLIC_PRIMARY_COLOR=#6d28d9
    depends_on:
      - eletrosil-back-local
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Volume anônimo para isolar o .next de cada tenant
      - /app/.next
    networks:
      - eletrofull-network

  # ══════════════════════════════════════════════════════════════════════════
  # TENANT 2 — ELETROMARQUES
  # ══════════════════════════════════════════════════════════════════════════

  eletromarques-back-local:
    build:
      context: ./backend
    container_name: eletromarques-back-local
    restart: always
    environment:
      DATABASE_URL: postgresql://zemarques:mrq831028@db:5432/emarques_db
      JWT_SECRET: "emarques-local-secret"
      COMPANY_NAME: "Eletromarques"
      TZ: America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port 8080 --reload"
    volumes:
      - ./backend:/app
      - avatars_local:/app/public/avatars
    networks:
      - eletrofull-network

  eletromarques-front-local:
    build:
      context: ./frontend
    container_name: eletromarques-front-local
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://eletromarques-back-local:8080
      - NEXT_PUBLIC_COMPANY_NAME=Eletromarques
      - NEXT_PUBLIC_PRIMARY_COLOR=#2563eb
    depends_on:
      - eletromarques-back-local
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Volume anônimo para isolar o .next de cada tenant
      - /app/.next
    networks:
      - eletrofull-network

volumes:
  postgres_data_local:
  avatars_local:

networks:
  eletrofull-network:
    driver: bridge