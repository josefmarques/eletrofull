server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    location /api/ {
        set $auth_header "";
        if ($http_cookie ~* "session_token=([^;]+)") {
            set $auth_header "Bearer $1";
        }

        # Remove o prefixo /api antes de encaminhar ao backend Python
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://backend:8080; # <-- PORTA CORRIGIDA PARA 8080
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $auth_header;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_next/webpack-hmr {
        proxy_pass http://frontend:3000/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
