server {
    listen 80;
    server_name eletrosil.top www.eletrosil.top;

    # Mantém o redirecionamento HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name eletrosil.top www.eletrosil.top;

    ssl_certificate /etc/letsencrypt/live/eletrosil.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eletrosil.top/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # --- BACKEND FASTAPI (PYTHON) ---
    location /api/ {
        # Lógica de Cookie para Authorization Header (Perfeito para o FastAPI receber o JWT)
        set $auth_header "";
        if ($http_cookie ~* "session_token=([^;]+)") {
            set $auth_header "Bearer $1";
        }
        
        # Remove o /api da URL: ex: /api/products -> /products
        rewrite ^/api(/.*)$ $1 break;
        
        # MUDANÇA CRÍTICA: Porta 8080 (Python) em vez de 3001 (Node)
        proxy_pass http://backend:8080;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $auth_header;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Opcional: Aumentar timeout para uploads ou processos longos de estoque
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # --- FRONTEND (NEXT.JS) ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}