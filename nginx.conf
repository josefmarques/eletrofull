# ═══════════════════════════════════════════════════════════════════════════════
# NGINX — Multi-Tenant: eletrosil.top + eletromarques.top
# ═══════════════════════════════════════════════════════════════════════════════
# Cada domínio tem:
#   - server_name próprio (separação de tráfego)
#   - Certificados SSL próprios (/etc/letsencrypt/live/<dominio>/)
#   - Proxy para backend:8080 (FastAPI) e frontend:3000 (Next.js)
#   - Header Host $host preservado (o Next.js usa para identificar o tenant)
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Bloco HTTP comum ──────────────────────────────────────────────────────
# Tamanho máximo do body (para uploads, etc)
client_max_body_size 50M;

# ─────────────────────────────────────────────────────────────────────────────
# DOMÍNIO 1 — eletrosil.top
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name eletrosil.top www.eletrosil.top;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name eletrosil.top www.eletrosil.top;

    # ── Certificados SSL próprios (Certbot) ──
    ssl_certificate     /etc/letsencrypt/live/eletrosil.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eletrosil.top/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── HEALTH CHECK (sem auth) ──
    location /api/health {
        proxy_pass http://eletrosil-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://eletrosil-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── BACKEND (FastAPI / Python) ──
    location /api/ {
        # Extrai token JWT do cookie "session_token" e repassa como Authorization
        set $auth_header "";
        if ($http_cookie ~* "session_token=([^;]+)") {
            set $auth_header "Bearer $1";
        }

        # Remove o prefixo /api antes de encaminhar ao backend
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://eletrosil-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;                       # ← CRÍTICO: preserva o domínio
        proxy_set_header Authorization $auth_header;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # ── FRONTEND (Next.js) ──
    location / {
        proxy_pass http://eletrosil-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# TENANT 2 — eletromarques.top
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name eletromarques.top www.eletromarques.top;
    return 301 https://$host$request_uri;
}

